{% extends 'resume/base.html' %}
{% load static %}

{% block head_title %}个人简历 - {{ resume.title }}{% endblock %}

{% block top-file %}
    <link href="{% static 'resume/css/detail.css' %}?v=20260626.01" rel="stylesheet">
    <style>{{ resume.template.content|safe }}</style>
{% endblock %}

{% block base_content %}
    <div class="resume-wrapper">
        <div class="resume-header">
            <h1 class="resume-name">{{ resume.title }}</h1>
        </div>
        <div class="resume-body">
            {{ resume.body|safe }}
        </div>
    </div>
{% endblock %}

{% block end_file %}{% endblock %}
